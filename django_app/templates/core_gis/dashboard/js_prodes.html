<script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('{% url "core_gis:dados_desmatamento_anual" %}')
            .then(response => response.json())
            .then(data => {
                // Update stats
                const totalArea = data.reduce((sum, item) => sum + parseFloat(item.total_area || 0), 0);
                document.getElementById('totalArea').textContent = new Intl.NumberFormat('pt-BR').format(Math.round(totalArea));
                document.getElementById('totalAnos').textContent = data.length;

                if (data.length > 0) {
                    const lastYear = data[data.length - 1];
                    document.getElementById('ultimoAno').textContent = new Intl.NumberFormat('pt-BR').format(Math.round(lastYear.total_area));

                    if (data.length > 1) {
                        const prevYear = data[data.length - 2];
                        const variacao = ((lastYear.total_area - prevYear.total_area) / prevYear.total_area * 100).toFixed(1);
                        document.getElementById('variacao').textContent = (variacao > 0 ? '+' : '') + variacao + '%';
                    }
                }

                // Bar Chart
                new Chart(document.getElementById('barChart'), {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item.ano),
                        datasets: [{
                            label: 'Área Desmatada (ha)',
                            data: data.map(item => item.total_area),
                            backgroundColor: 'rgba(220, 53, 69, 0.7)',
                            borderColor: 'rgba(220, 53, 69, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function (value) {
                                        return new Intl.NumberFormat('pt-BR').format(value);
                                    }
                                }
                            }
                        }
                    }
                });

                // Line Chart
                new Chart(document.getElementById('lineChart'), {
                    type: 'line',
                    data: {
                        labels: data.map(item => item.ano),
                        datasets: [{
                            label: 'Área Desmatada (ha)',
                            data: data.map(item => item.total_area),
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function (value) {
                                        return new Intl.NumberFormat('pt-BR').format(value);
                                    }
                                }
                            }
                        }
                    }
                });

                // Pie Chart - Split by periods
                const midPoint = Math.ceil(data.length / 2);
                const firstHalf = data.slice(0, midPoint).reduce((sum, item) => sum + parseFloat(item.total_area || 0), 0);
                const secondHalf = data.slice(midPoint).reduce((sum, item) => sum + parseFloat(item.total_area || 0), 0);

                new Chart(document.getElementById('pieChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Período Inicial', 'Período Recente'],
                        datasets: [{
                            data: [firstHalf, secondHalf],
                            backgroundColor: ['#dc3545', '#6c757d']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });

                // Data Table
                const tableBody = document.getElementById('dataTable');
                tableBody.innerHTML = '';

                data.forEach((item, index) => {
                    let variacao = '-';
                    if (index > 0) {
                        const prev = data[index - 1].total_area;
                        const varPercent = ((item.total_area - prev) / prev * 100).toFixed(1);
                        const icon = varPercent > 0 ? 'bi-arrow-up text-danger' : 'bi-arrow-down text-success';
                        variacao = `<i class="bi ${icon}"></i> ${varPercent}%`;
                    }

                    tableBody.innerHTML += `
                    <tr>
                        <td><strong>${item.ano}</strong></td>
                        <td>${new Intl.NumberFormat('pt-BR').format(Math.round(item.total_area))} ha</td>
                        <td>${item.total_poligonos || '-'}</td>
                        <td>${variacao}</td>
                    </tr>
                `;
                });
            })
            .catch(err => {
                console.error('Error loading data:', err);
            });
    });
</script>
