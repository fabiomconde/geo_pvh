{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/mapas.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid py-3">
    <div class="row">
        <!-- Map Controls Sidebar -->
        <div class="col-lg-3 col-md-4 mb-3">
            <div class="map-sidebar">
                <div class="layer-control">
                    <h5 class="mb-3">
                        <i class="bi bi-layers"></i> Camadas
                    </h5>

                    <!-- Base Layers -->
                    <div class="mb-3">
                        <h6 class="text-muted">Mapa Base</h6>
                        <div class="layer-item">
                            <input type="radio" name="baseLayer" id="osmLayer" checked class="form-check-input me-2">
                            <label for="osmLayer">OpenStreetMap</label>
                        </div>
                        <div class="layer-item">
                            <input type="radio" name="baseLayer" id="satelliteLayer" class="form-check-input me-2">
                            <label for="satelliteLayer">Satélite</label>
                        </div>
                        <div class="layer-item">
                            <input type="radio" name="baseLayer" id="topoLayer" class="form-check-input me-2">
                            <label for="topoLayer">Topográfico</label>
                        </div>
                    </div>

                    <!-- Overlay Layers -->
                    <div class="mb-3">
                        <h6 class="text-muted">Dados PRODES</h6>
                        <div class="layer-item">
                            <input type="checkbox" id="desmatamentoLayer" checked class="form-check-input me-2">
                            <label for="desmatamentoLayer">Desmatamento</label>
                        </div>
                        <div class="layer-item">
                            <input type="checkbox" id="bairrosLayer" class="form-check-input me-2">
                            <label for="bairrosLayer">Bairros de PVH</label>
                        </div>
                    </div>

                    <!-- Year Filter -->
                    <div class="mb-3">
                        <h6 class="text-muted">Filtrar por Ano</h6>
                        <select id="yearFilter" class="form-select">
                            <option value="all">Todos os anos</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                            <option value="2020">2020</option>
                            <option value="2019">2019</option>
                        </select>
                    </div>

                    <!-- Legend -->
                    <div class="mb-3">
                        <h6 class="text-muted">Legenda</h6>
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(220, 53, 69, 0.7);"></div>
                            <span>Desmatamento PRODES</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(13, 110, 253, 0.5);"></div>
                            <span>Limites de Bairros</span>
                        </div>
                    </div>

                    <!-- Info Panel -->
                    <div id="featureInfo" class="alert alert-info d-none">
                        <h6><i class="bi bi-info-circle"></i> Informações</h6>
                        <div id="featureDetails"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map Container -->
        <div class="col-lg-9 col-md-8">
            <div class="map-sidebar p-2">
                <div class="d-flex justify-content-between align-items-center mb-2 px-2">
                    <h5 class="mb-0">
                        <i class="bi bi-tree text-danger"></i>
                        Mapa de Desmatamento - PRODES
                    </h5>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" id="zoomToPVH">
                            <i class="bi bi-geo-alt"></i> Porto Velho
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="fullscreenBtn">
                            <i class="bi bi-fullscreen"></i>
                        </button>
                    </div>
                </div>
                <div id="map" class="map-container rounded"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // 1. INICIALIZAÇÃO DO MAPA
        const map = L.map('map').setView({{ map_center }}, {{ map_zoom }});

    // 2. DEFINIÇÃO DE CAMADAS BASE (MAPAS DE FUNDO)
    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '© Esri'
    });

    const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenTopoMap'
    });

    // Alternar Mapas Base via Radio Buttons
    document.getElementById('osmLayer').addEventListener('change', () => {
        map.removeLayer(satelliteLayer); map.removeLayer(topoLayer); osmLayer.addTo(map);
    });
    document.getElementById('satelliteLayer').addEventListener('change', () => {
        map.removeLayer(osmLayer); map.removeLayer(topoLayer); satelliteLayer.addTo(map);
    });
    document.getElementById('topoLayer').addEventListener('change', () => {
        map.removeLayer(osmLayer); map.removeLayer(satelliteLayer); topoLayer.addTo(map);
    });

    // 3. DEFINIÇÃO DE CAMADAS WMS (GEOSERVER - FALLBACK)
    const desmatamentoWMS = L.tileLayer.wms("/geoserver/wms", {
        layers: 'pvh:desmatamento_pvh',
        format: 'image/png',
        transparent: true,
        version: '1.1.1',
        attribution: "Protótipo de Observatório Geoespacial de Porto Velho - Rondônia"
    });

    const bairrosWMS = L.tileLayer.wms("/geoserver/wms", {
        layers: 'pvh:bairros_pvh',
        format: 'image/png',
        transparent: true,
        version: '1.1.1',
        attribution: "Protótipo de Observatório Geoespacial de Porto Velho - Rondônia"
    });

    // 4. VARIÁVEIS PARA ARMAZENAR CAMADAS GEOJSON (API)
    let desmatamentoGeoJSON;
    let bairrosGeoJSON;

    // 5. FUNÇÃO PARA CARREGAR DESMATAMENTO (COM FILTRO DE ANO)
    function loadDesmatamento(year = 'all') {
        // Remover camada atual se existir
        if (desmatamentoGeoJSON) map.removeLayer(desmatamentoGeoJSON);
        map.removeLayer(desmatamentoWMS);

        let url = '/api/desmatamento/?format=json';
        if (year !== 'all') url += `&ano=${year}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const geojsonData = data.results ? data.results : data;

                if (geojsonData.features && geojsonData.features.length > 0) {
                    desmatamentoGeoJSON = L.geoJSON(geojsonData, {
                        style: {
                            fillColor: '#dc3545',
                            fillOpacity: 0.6,
                            color: '#b02a37',
                            weight: 1
                        },
                        onEachFeature: (feature, layer) => {
                            const p = feature.properties;
                            layer.bindPopup(`
                                <strong>Desmatamento PRODES</strong><br>
                                Ano: ${p.ano}<br>
                                Área: ${p.area_ha ? parseFloat(p.area_ha).toFixed(2) : 'N/A'} ha
                            `);
                            layer.on('click', () => showFeatureInfo(p));
                        }
                    });

                    // Adicionar ao mapa apenas se o checkbox estiver marcado
                    if (document.getElementById('desmatamentoLayer').checked) {
                        desmatamentoGeoJSON.addTo(map);
                    }
                }
            })
            .catch(err => {
                console.error('Erro API Desmatamento:', err);
                if (document.getElementById('desmatamentoLayer').checked) desmatamentoWMS.addTo(map);
            });
    }

    // 6. FUNÇÃO PARA CARREGAR BAIRROS
    function loadBairros() {
        fetch('/api/bairros/?format=json')
            .then(response => response.json())
            .then(data => {
                const geojsonData = data.results ? data.results : data;
                if (geojsonData.features) {
                    bairrosGeoJSON = L.geoJSON(geojsonData, {
                        style: {
                            fillColor: '#0d6efd',
                            fillOpacity: 0.3,
                            color: '#0d6efd',
                            weight: 2
                        },
                        onEachFeature: (feature, layer) => {
                            layer.bindPopup(`<strong>Bairro: ${feature.properties.nome}</strong><br>Zona: ${feature.properties.zona}`);
                        }
                    });

                    if (document.getElementById('bairrosLayer').checked) {
                        bairrosGeoJSON.addTo(map);
                    }
                }
            })
            .catch(err => {
                console.error('Erro API Bairros:', err);
                if (document.getElementById('bairrosLayer').checked) bairrosWMS.addTo(map);
            });
    }

    // 7. CONTROLES DE INTERAÇÃO (CHECKBOXES E FILTROS)

    // Checkbox Desmatamento
    document.getElementById('desmatamentoLayer').addEventListener('change', function () {
        if (this.checked) {
            if (desmatamentoGeoJSON) desmatamentoGeoJSON.addTo(map);
            else desmatamentoWMS.addTo(map);
        } else {
            if (desmatamentoGeoJSON) map.removeLayer(desmatamentoGeoJSON);
            map.removeLayer(desmatamentoWMS);
        }
    });

    // Checkbox Bairros
    document.getElementById('bairrosLayer').addEventListener('change', function () {
        if (this.checked) {
            if (bairrosGeoJSON) bairrosGeoJSON.addTo(map);
            else bairrosWMS.addTo(map);
        } else {
            if (bairrosGeoJSON) map.removeLayer(bairrosGeoJSON);
            map.removeLayer(bairrosWMS);
        }
    });

    // Filtro de Ano
    document.getElementById('yearFilter').addEventListener('change', function () {
        loadDesmatamento(this.value);
    });

    // 8. BOTÕES UTILITÁRIOS
    document.getElementById('zoomToPVH').addEventListener('click', () => {
        map.setView([-8.76, -63.90], 10);
    });

    document.getElementById('fullscreenBtn').addEventListener('click', () => {
        const m = document.getElementById('map');
        if (m.requestFullscreen) m.requestFullscreen();
    });

    // 9. PAINEL DE INFORMAÇÕES LATERAL
    function showFeatureInfo(props) {
        const infoPanel = document.getElementById('featureInfo');
        const details = document.getElementById('featureDetails');
        details.innerHTML = `
            <p><strong>Ano:</strong> ${props.ano}</p>
            <p><strong>Área:</strong> ${props.area_ha ? parseFloat(props.area_ha).toFixed(2) : 'N/A'} ha</p>
            <p><strong>Classe:</strong> ${props.classe || 'N/A'}</p>
            <p><strong>Fonte:</strong> ${props.fonte || 'PRODES/INPE'}</p>
        `;
        infoPanel.classList.remove('d-none');
    }

    // 10. CARREGAMENTO INICIAL
    L.control.scale({ metric: true, imperial: false, position: 'bottomleft' }).addTo(map);
    loadDesmatamento(); // Carrega desmatamento inicial
    loadBairros();      // Carrega bairros inicial
});
</script>
{% endblock %}
