{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/mapas.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid py-3">
    <div class="row">
        <div class="col-lg-3 col-md-4 mb-3">
            <div class="map-sidebar">
                <div class="layer-control">
                    <h5 class="mb-3">
                        <i class="bi bi-layers"></i> Camadas
                    </h5>

                    <div class="mb-3">
                        <h6 class="text-muted">Mapa Base</h6>
                        <div class="form-check">
                            <input type="radio" name="baseLayer" id="osmLayer" checked class="form-check-input">
                            <label for="osmLayer" class="form-check-label">OpenStreetMap</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="baseLayer" id="satelliteLayer" class="form-check-input">
                            <label for="satelliteLayer" class="form-check-label">Satélite</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <h6 class="text-muted">Alertas DETER</h6>
                        <div class="form-check">
                            <input type="checkbox" id="alertasLayer" checked class="form-check-input">
                            <label for="alertasLayer" class="form-check-label">Alertas</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <h6 class="text-muted">Legenda</h6>
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(255, 193, 7, 0.7);"></div>
                            <span>Desmatamento CR</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(255, 152, 0, 0.7);"></div>
                            <span>Degradação</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: rgba(156, 39, 176, 0.7);"></div>
                            <span>Mineração</span>
                        </div>
                    </div>

                    <div id="featureInfo" class="alert alert-warning d-none">
                        <h6><i class="bi bi-exclamation-triangle"></i> Alerta</h6>
                        <div id="featureDetails"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="map-sidebar p-2">
                <div class="d-flex justify-content-between align-items-center mb-2 px-2">
                    <h5 class="mb-0">
                        <i class="bi bi-exclamation-triangle text-warning"></i>
                        Mapa de Alertas - DETER
                    </h5>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" id="zoomToPVH">
                            <i class="bi bi-geo-alt"></i> Porto Velho
                        </button>
                    </div>
                </div>
                <div id="map" class="map-container rounded"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const map = L.map('map').setView({{ map_center }}, {{ map_zoom }});

    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '© Esri'
    });

    document.getElementById('osmLayer').addEventListener('change', function () {
        map.removeLayer(satelliteLayer);
        osmLayer.addTo(map);
    });

    document.getElementById('satelliteLayer').addEventListener('change', function () {
        map.removeLayer(osmLayer);
        satelliteLayer.addTo(map);
    });

    // Load alerts from API
    let alertasGeoJSON;
    fetch('/api/alertas/?format=json')
        .then(response => response.json())
        .then(data => {
            alertasGeoJSON = L.geoJSON(data, {
                style: function (feature) {
                    const classe = feature.properties.classe;
                    let color = '#ffc107';
                    if (classe === 'DEGRADACAO') color = '#ff9800';
                    if (classe === 'MINERACAO') color = '#9c27b0';
                    return {
                        fillColor: color,
                        fillOpacity: 0.6,
                        color: color,
                        weight: 2
                    };
                },
                onEachFeature: function (feature, layer) {
                    const props = feature.properties;
                    layer.bindPopup(`
                        <strong>Alerta DETER</strong><br>
                        Data: ${props.data_alerta}<br>
                        Classe: ${props.classe}<br>
                        Área: ${props.area_ha ? props.area_ha.toFixed(2) + ' ha' : 'N/A'}<br>
                        Satélite: ${props.satelite || 'N/A'}
                    `);
                }
            });
            alertasGeoJSON.addTo(map);
        })
        .catch(err => console.log('Error loading alerts:', err));

    document.getElementById('alertasLayer').addEventListener('change', function () {
        if (this.checked && alertasGeoJSON) {
            alertasGeoJSON.addTo(map);
        } else if (alertasGeoJSON) {
            map.removeLayer(alertasGeoJSON);
        }
    });

    document.getElementById('zoomToPVH').addEventListener('click', function () {
        map.setView([-8.76, -63.90], 10);
    });

    L.control.scale({ metric: true, imperial: false }).addTo(map);
});
</script>
{% endblock %}
