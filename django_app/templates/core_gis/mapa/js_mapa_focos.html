<script>
    document.addEventListener('DOMContentLoaded', function () {
        const map = L.map('map').setView({{ map_center|default:'[-8.76, -63.90]' }}, {{ map_zoom|default:10 }});

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

        document.getElementById('osmLayer').addEventListener('change', function () {
            map.removeLayer(satelliteLayer);
            osmLayer.addTo(map);
        });

        document.getElementById('satelliteLayer').addEventListener('change', function () {
            map.removeLayer(osmLayer);
            satelliteLayer.addTo(map);
        });

        // Load fire spots from API
        let focosLayer;
        fetch('/api/focos/?format=json')
            .then(response => response.json())
            .then(data => {
                focosLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: '#ff5722',
                            color: '#e64a19',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        const props = feature.properties;
                        layer.bindPopup(`
                            <strong>Foco de Calor</strong><br>
                            Data/Hora: ${props.data_hora}<br>
                            Satélite: ${props.satelite || 'N/A'}<br>
                            Temperatura: ${props.temperatura_k ? props.temperatura_k + ' K' : 'N/A'}<br>
                            FRP: ${props.frp || 'N/A'}
                        `);
                    }
                });
                focosLayer.addTo(map);
            })
            .catch(err => console.log('Error loading fire spots:', err));

        if (document.getElementById('focosLayer')) {
            document.getElementById('focosLayer').addEventListener('change', function () {
                if (this.checked && focosLayer) {
                    focosLayer.addTo(map);
                } else if (focosLayer) {
                    map.removeLayer(focosLayer);
                }
            });
        }

        document.getElementById('zoomToPVH').addEventListener('click', function () {
            map.setView({{ map_center|default:'[-8.76, -63.90]' }}, {{ map_zoom|default:10 }});
        });

        L.control.scale({ metric: true, imperial: false }).addTo(map);
    });
</script>
