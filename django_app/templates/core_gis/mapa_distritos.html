{% extends 'base.html' %}
{% load static %}

{% block title %}Mapa de Distritos e Localidades - Observatório de Conflitos Socioambientais e Direitos Humanos -Porto
Velho{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div id="map" style="width: 100%; height: calc(100vh - 70px);"></div>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    .leaflet-popup-content-wrapper {
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .leaflet-popup-content {
        font-family: 'Outfit', sans-serif;
    }

    .district-popup h5 {
        color: #f97316;
        font-weight: 700;
        margin-bottom: 10px;
    }

    .district-popup p {
        margin-bottom: 5px;
        font-size: 0.95rem;
    }

    .district-popup strong {
        color: #1e293b;
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map
    var map = L.map('map').setView([-8.7619, -63.9039], 8); // Centered on PVH

    // Base Layer (OSM)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Fetch Districts from Django API
    var distritosUrl = "{% url 'core_gis:distritos_geojson' %}";
    var limiteUrl = "{% url 'core_gis:limite_pvh_geojson' %}";

    // 1. Fetch Limite Municipal first (to be background)
    fetch(limiteUrl)
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: function (feature) {
                    return {
                        color: "#3388ff",
                        weight: 3,
                        opacity: 0.8,
                        fillOpacity: 0.1,
                        fillColor: "#3388ff",
                        dashArray: '5, 5'
                    };
                },
                onEachFeature: function (feature, layer) {
                    if (feature.properties && feature.properties.nome) {
                        layer.bindPopup("<strong>" + feature.properties.nome + "</strong>");
                    }
                }
            }).addTo(map);

            // 2. Then fetch Districts Points (to be on top)
            return fetch(distritosUrl);
        })
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                pointToLayer: function (feature, latlng) {
                    return L.marker(latlng);
                },
                onEachFeature: function (feature, layer) {
                    var props = feature.properties;
                    var content = `
                        <h6>${props.nome}</h6>
                        <table class="table table-sm table-borderless mb-0">
                            <tr><td><strong>População:</strong></td><td>${props.populacao_2022}</td></tr>
                            <tr><td><strong>Distância Sede:</strong></td><td>${props.distancia_sede}</td></tr>
                            <tr><td colspan="2"><small>${props.caracteristicas}</small></td></tr>
                        </table>
                    `;
                    layer.bindPopup(content);
                }
            }).addTo(map);
        })
        .catch(function (error) {
            console.error('Error loading data:', error);
            // Fallback for CORS or connection error: Suggest user to check console
            alert("Erro ao carregar dados do GeoServer. Verifique o console ou certifique-se que o GeoServer está rodando e permite CORS.");
        });
</script>
{% endblock %}
