services:
  # PostgreSQL com PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: pvh_postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./data_source:/tmp/data_source
      #- /home/dev/programacao/pvh_geoportal/data_source:/tmp/data_source
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geoportal_network

  # Redis para cache
  redis:
    image: redis:7-alpine
    container_name: pvh_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - geoportal_network

  # GeoServer para servir mapas WMS/WFS
  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: pvh_geoserver
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
      STABLE_EXTENSIONS: "css-plugin,ysld-plugin"
      COMMUNITY_EXTENSIONS: ""
    volumes:
      - ./geoserver_data:/opt/geoserver/data_dir
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/geoserver/web/" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - geoportal_network

  # Django Application
  django:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: pvh_django
    stdin_open: true
    tty: true
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - REDIS_URL=${REDIS_URL}
      - GEOSERVER_URL=/geoserver
    volumes:
      - ./django_app:/app
      - ./data_source:/app/data_source
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
      - "5678:5678" # Porta do Debugger já está aqui, perfeito.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python -m debugpy --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000 --nothreading --noreload"
    networks:
      - geoportal_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pvh_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - django
      - geoserver
    networks:
      - geoportal_network

volumes:
  postgres_data:
  static_volume:
  media_volume:


networks:
  geoportal_network:
    driver: bridge
